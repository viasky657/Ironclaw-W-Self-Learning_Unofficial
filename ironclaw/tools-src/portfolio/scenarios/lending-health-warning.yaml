id: lending-health-warning
description: |
  Fixture address 0x2222... holds a borrowing Aave v3 position with
  `health_factor: 1.15` — below the lending-health-guard strategy's
  danger_threshold of 1.3 but above the critical threshold 1.1. The
  analyzer should surface the health field; the strategy should fire
  a `ready` proposal at severity `warning`.
steps:
  - name: scan
    action: scan
    params:
      addresses: ["0x2222222222222222222222222222222222222222"]
      source: fixture
    capture:
      positions_var: positions

  - name: propose
    action: propose
    params:
      positions: $positions
      strategies:
        - |
          ---
          id: lending-health-guard
          version: 1
          kind: health-guard
          applies_to:
            category: lending
          constraints:
            max_risk_score: 5
          inputs:
            danger_threshold: 1.3
            critical_threshold: 1.1
          ---
          # lending health guard
      config:
        floor_apy: 0.04
        max_risk_score: 3
        notify_threshold_usd: 100
        auto_intent_ceiling_usd: 1000
        max_slippage_bps: 50
    expect:
      ready_proposals_min: 1
      first_strategy_id: lending-health-guard
      has_ready_proposal_matching_rationale: "warning"
