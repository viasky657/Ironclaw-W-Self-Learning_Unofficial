name: Replay Snapshot Gate

# Runs `cargo insta test --check` over the committed replay fixtures so any
# change to engine dispatch, agent loop, or tool execution has to come with
# an accepted snapshot diff. `test.yml` calls this workflow directly through
# `workflow_call` when replay becomes part of the protected `Run Tests`
# roll-up, and `push: main` keeps the replay cache warm between those runs.
#
# Cache strategy: GitHub Actions enforces a 10 GB per-repo cache quota, and
# the repo routinely sits close to that ceiling, so PR-scoped caches get
# LRU-evicted between runs. The `push: main` trigger primes a warm cache
# every time work lands there; PRs targeting main then restore from that
# cache (GitHub allows cross-ref restore from the PR's base) instead of
# paying the full cold-cache compile on every push.

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  replay-snapshots:
    name: Replay snapshot gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: replay-gate
          save-if: ${{ github.event_name == 'push' }}

      - name: Install cargo-insta and cargo-nextest
        uses: taiki-e/install-action@62b0f2dec647a8e604c6a0fda0e38530180dce20 # v2
        with:
          tool: cargo-insta,cargo-nextest

      - name: Run replay snapshot tests
        env:
          NEXTEST_PROFILE: ci
        run: |
          cargo insta test \
            --check \
            --test-runner nextest \
            --no-default-features \
            --features "libsql,replay" \
            --test e2e_engine_v2 \
            --test e2e_recorded_trace \
            --test e2e_live

      - name: Report trace coverage
        run: ./scripts/trace-coverage.sh

      - name: Reject committed .snap.new files
        run: |
          if git ls-files 'tests/snapshots/*.snap.new' | grep .; then
            echo "Committed .snap.new files found — run 'cargo insta review' and commit the accepted .snap."
            exit 1
          fi
