[project]
name = "ironclaw-e2e"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-playwright>=0.5",
    "pytest-timeout>=2.3",
    "playwright>=1.40",
    "aiohttp>=3.9",
    "httpx>=0.27",
]

[project.optional-dependencies]
vision = [
    "anthropic>=0.40",
]
telegram = [
    "telethon>=1.40",
]

# `fixtures/` (live-LLM record/replay JSON, no Python) sits alongside
# `scenarios/` after #3133 landed. Setuptools auto-discovery refuses a
# flat layout with multiple top-level packages, so scope discovery to
# the actual Python package and exclude data-only directories.
[tool.setuptools.packages.find]
include = ["scenarios*"]
exclude = ["fixtures*", "screenshots*", "test-pages*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
timeout = 360
